family: "${DATA_IMPORT_TASK}"
networkMode: awsvpc
cpu: "${DATA_IMPORT_TASK_CPU_UNITS}"
memory: "${DATA_IMPORT_TASK_MEMORY_UNITS}"
executionRoleArn: "${ROLE_ARN}"
taskRoleArn: "${ROLE_ARN}"
requiresCompatibilities:
- FARGATE
volumes:
  - name: data
    efsVolumeConfiguration:
      fileSystemId: "${EFS_FILESYSTEM_ID}"
      authorizationConfig: 
        accessPointId: "${EFS_ACCESS_POINT_ID}"
        iam: ENABLED
      transitEncryption: ENABLED
containerDefinitions:
- name: data-import
  image: "${DATA_IMPORT_IMAGE_LATEST}"
  mountPoints:
    - sourceVolume: data
      containerPath: "/data"
      readOnly: false
  logConfiguration:
    logDriver: awslogs
    options:
      awslogs-group: "/analysistools/${TIER}/${APP}/data-import"
      awslogs-region: "${AWS_REGION}"
      awslogs-stream-prefix: data-import
tags:
  - key: Project
    value: "${APP}"
  - key: ApplicationName
    value: "${APP}"
  - key: ResourceName
    value: "${TIER}-${APP}-data-import-ecs-task"
  - key: EnvironmentTier
    value: "${TIER_UPPER}"
  - key: ResourceFunction
    value: compute
  - key: Creator
    value: CF
